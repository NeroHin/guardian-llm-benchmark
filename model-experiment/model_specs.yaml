version: 1
models:
  - key: granite-openrouter
    model_id: ibm-granite/granite-4.0-h-micro
    provider: openrouter
    enabled: false
    settings:
      temperature: 0
      max_tokens: 128
      response_format: json_object

  - key: gpt41nano-openrouter
    model_id: openai/gpt-4.1-nano
    provider: openrouter
    enabled: false
    settings:
      temperature: 0
      max_tokens: 128
      response_format: json_object

  - key: qwen3guard4b-stream
    model_id: Qwen/Qwen3Guard-Stream-4B
    provider: qwen_stream
    enabled: false
    profile: qwen_stream
    settings:
      trust_remote_code: true
      torch_dtype: auto
      device_map: auto

  - key: qwen3guard06b-stream
    model_id: Qwen/Qwen3Guard-Stream-0.6B
    provider: qwen_stream
    enabled: false
    profile: qwen_stream
    settings:
      trust_remote_code: true
      torch_dtype: auto
      device_map: auto

  - key: granite-mirco-hf-mirco
    model_id: ibm-granite/granite-4.0-h-micro
    provider: huggingface
    enabled: true
    profile: granite_guard_json
    settings:
      trust_remote_code: true
      torch_dtype: auto
      device_map: auto
      max_new_tokens: 256
      do_sample: false

  - key: granite-tiny-hf-1b
    model_id: ibm-granite/granite-4.0-h-1b
    provider: huggingface
    enabled: true
    profile: granite_guard_json
    settings:
      trust_remote_code: true
      torch_dtype: float16
      device_map: auto
      max_new_tokens: 256
      do_sample: false

  - key: qwen25-05b-hf
    model_id: Qwen/Qwen2.5-0.5B-Instruct
    provider: huggingface
    enabled: false
    profile: qwen_instruct_json
    settings:
      trust_remote_code: false
      torch_dtype: float16
      device_map: auto
      max_input_tokens: 512
      max_new_tokens: 128
      do_sample: false
      use_cache: true

  - key: qwen25-3b-hf
    model_id: Qwen/Qwen2.5-3B-Instruct
    provider: huggingface
    enabled: false
    profile: qwen_instruct_json
    settings:
      trust_remote_code: false
      torch_dtype: auto
      device_map: auto
      max_input_tokens: 512
      max_new_tokens: 128
      do_sample: false
      use_cache: true